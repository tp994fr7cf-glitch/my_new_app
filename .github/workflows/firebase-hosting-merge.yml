# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_NEW_APP_NAONA_20260523 }}
          channelId: live
          firebaseToolsVersion: latest
          projectId: my-new-app-naona-20260523
      - name: Deploy Firestore and Storage rules
        id: deploy_rules
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_NEW_APP_NAONA_20260523 }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/firebase-sa.json"
          npm install -g firebase-tools
          firebase deploy --only firestore:rules --project my-new-app-naona-20260523 --non-interactive
          firebase deploy --only storage --project my-new-app-naona-20260523 --non-interactive
      - name: Rules deploy reminder
        if: steps.deploy_rules.outcome == 'failure'
        run: |
          echo "::warning::Firebase rules were not deployed automatically."
          echo "::warning::Grant the GitHub Actions service account Firebase Rules Admin and Storage Admin roles,"
          echo "::warning::or run locally: firebase deploy --only storage,firestore:rules"
